name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — pytest
    runs-on: self-hosted

    defaults:
      run:
        working-directory: backend

    env:
      SECRET_KEY: ci-secret-key-not-used-in-prod
      ALLOWED_HOSTS: localhost,127.0.0.1
      DJANGO_SETTINGS_MODULE: financetracker.settings.development

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: pip3 install -r requirements.txt

      - name: Run tests
        run: python3 -m pytest

  frontend:
    name: Frontend — build
    runs-on: self-hosted

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
